<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --primary: #00aaff; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Tajawal', sans-serif; margin: 0; }
        .header { background: #1a1a1a; padding: 15px; border-bottom: 2px solid var(--primary); }
        .admin-controls { max-width: 1000px; margin: 0 auto; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; align-items: center; }
        .btn { padding: 8px 15px; border-radius: 5px; text-decoration: none; font-size: 0.8rem; font-weight: bold; cursor: pointer; border: none; color: white; display: inline-flex; align-items: center; gap: 5px; }
        .btn-toggle { background: #444; }
        .btn-toggle.active { background: #ff9800; }
        .btn-save { background: #28a745; }
        .btn-reset { background: #ff4444; }
        .btn-logout { background: #666; }
        .global-url-form { display: flex; gap: 5px; margin-top: 10px; width: 100%; max-width: 600px; }
        .global-url-form input { flex: 1; padding: 8px; border-radius: 5px; border: 1px solid #444; background: #222; color: #00ff00; font-size: 0.8rem; }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .card { background: var(--card); border-radius: 10px; overflow: hidden; border: 1px solid #333; cursor: pointer; position: relative; transition: border-color 0.2s; }
        .card:hover { border-color: var(--primary); }
        .card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .card-title { padding: 10px; font-size: 0.85rem; text-align: center; }
        .badge-custom { position: absolute; top: 5px; right: 5px; background: #ff9800; color: black; font-size: 0.6rem; padding: 2px 5px; border-radius: 3px; font-weight: bold; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); width: 90%; max-width: 500px; padding: 20px; border-radius: 15px; border: 1px solid #444; }
        .input-group { margin: 15px 0; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--primary); }
        .input-group input { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #111; color: white; box-sizing: border-box; }
        .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        #loginBox { max-width: 350px; margin: 100px auto; background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #333; text-align: center; }
        #loginBox h2 { color: var(--primary); margin-bottom: 20px; }
        #loginBox input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #444; background: #111; color: white; box-sizing: border-box; }
        #loginBox button { width: 100%; padding: 10px; background: var(--primary); color: black; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; font-family: 'Tajawal', sans-serif; }
        .error { color: #ff4444; margin-top: 10px; font-size: 0.9rem; }
        #loading { text-align: center; padding: 50px; color: var(--primary); }
        .spinner { font-size: 2rem; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- Login Screen -->
<div id="loginBox" style="display:none">
    <h2><i class="fas fa-lock"></i> تسجيل الدخول</h2>
    <input type="password" id="loginPass" placeholder="كلمة المرور..." onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> دخول</button>
    <div id="loginError" class="error"></div>
</div>

<!-- Main Panel -->
<div id="mainPanel" style="display:none">
    <header class="header">
        <div class="admin-controls">
            <button id="toggleBtn" class="btn btn-toggle" onclick="toggleRedirect()">
                <i class="fas fa-random"></i> <span id="toggleText">وضع التحويل: معطل</span>
            </button>
            <div class="global-url-form">
                <input type="text" id="globalUrlInput" placeholder="ضع الرابط العام هنا...">
                <button class="btn btn-save" onclick="saveGlobalUrl()">حفظ العام</button>
            </div>
            <button class="btn btn-logout" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
    </header>

    <div class="container">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 id="pageTitle" style="margin:0;">القنوات</h2>
            <button id="backBtn" class="btn btn-toggle" style="display:none" onclick="goBack()">
                <i class="fas fa-arrow-right"></i> عودة
            </button>
        </div>
        <div id="loading"><span class="spinner"><i class="fas fa-circle-notch"></i></span><br><br>جاري التحميل...</div>
        <div class="grid" id="itemsGrid"></div>
    </div>
</div>

<!-- Channel Modal -->
<div id="channelModal" class="modal">
    <div class="modal-content">
        <h3 id="m_name" style="text-align:center; color: var(--primary);">اسم القناة</h3>
        <div class="input-group">
            <label>الرابط الأصلي:</label>
            <input type="text" id="m_orig" readonly style="color: #888; font-size: 0.7rem;">
        </div>
        <div class="input-group">
            <label>تعديل الرابط لهذه القناة:</label>
            <input type="text" id="m_custom" placeholder="اتركه فارغاً للأصلي">
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-toggle" onclick="closeModal()">إلغاء</button>
            <a href="#" id="m_reset_btn" class="btn btn-reset" style="display:none" onclick="resetChannel()">العودة للأصلي</a>
            <button class="btn btn-save" onclick="saveIndividual()">حفظ التغيير</button>
        </div>
        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
        <div class="input-group">
            <label>رابط AppCreator المباشر (m3u8):</label>
            <input type="text" id="m_proxy" readonly style="color: #00ff00; font-size: 0.8rem;">
            <button class="btn btn-toggle" style="width:100%; margin-top:5px;" onclick="copyProxy()">نسخ الرابط للمشغل</button>
        </div>
    </div>
</div>

<script>
// ============================================================
// State
// ============================================================
let authToken = sessionStorage.getItem('authToken') || '';
let globalConfig = { active: false, url: '' };
let overrides = {};
let currentCat = '';
let currentItemId = '';

const BASE = window.location.origin;

// ============================================================
// Auth
// ============================================================
async function doLogin() {
    const pass = document.getElementById('loginPass').value;
    const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pass })
    });
    const data = await res.json();
    if (data.ok) {
        authToken = data.token;
        sessionStorage.setItem('authToken', authToken);
        loadPanel();
    } else {
        document.getElementById('loginError').textContent = 'كلمة المرور غير صحيحة!';
    }
}

function doLogout() {
    sessionStorage.removeItem('authToken');
    authToken = '';
    document.getElementById('mainPanel').style.display = 'none';
    document.getElementById('loginBox').style.display = 'block';
}

// ============================================================
// Init
// ============================================================
async function init() {
    if (authToken) {
        const ok = await loadPanel();
        if (!ok) showLogin();
    } else {
        showLogin();
    }
}

function showLogin() {
    document.getElementById('loginBox').style.display = 'block';
}

async function loadPanel() {
    const res = await fetch('/api/config', { headers: { 'x-auth': authToken } });
    if (!res.ok) return false;
    const data = await res.json();
    globalConfig = data.global;
    overrides = data.overrides;
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('mainPanel').style.display = 'block';
    updateToggleBtn();
    document.getElementById('globalUrlInput').value = globalConfig.url || '';
    loadItems(currentCat);
    return true;
}

// ============================================================
// Config Actions
// ============================================================
async function toggleRedirect() {
    globalConfig.active = !globalConfig.active;
    await saveConfig();
    updateToggleBtn();
}

async function saveGlobalUrl() {
    globalConfig.url = document.getElementById('globalUrlInput').value;
    await saveConfig();
    alert('تم الحفظ');
}

async function saveConfig() {
    await fetch('/api/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-auth': authToken },
        body: JSON.stringify({ global: globalConfig, overrides })
    });
}

function updateToggleBtn() {
    const btn = document.getElementById('toggleBtn');
    const txt = document.getElementById('toggleText');
    if (globalConfig.active) {
        btn.classList.add('active');
        txt.textContent = 'وضع التحويل: مفعل';
    } else {
        btn.classList.remove('active');
        txt.textContent = 'وضع التحويل: معطل';
    }
}

// ============================================================
// Load Items
// ============================================================
async function loadItems(cat) {
    currentCat = cat || '';
    document.getElementById('itemsGrid').innerHTML = '';
    document.getElementById('loading').style.display = 'block';
    document.getElementById('backBtn').style.display = cat ? 'inline-flex' : 'none';
    document.getElementById('pageTitle').textContent = cat ? 'القنوات' : 'الفئات';

    const url = cat ? `/api/items?cat=${cat}` : '/api/items';
    const res = await fetch(url, { headers: { 'x-auth': authToken } });
    const data = await res.json();
    document.getElementById('loading').style.display = 'none';
    renderItems(data.items || []);
}

function renderItems(items) {
    const grid = document.getElementById('itemsGrid');
    grid.innerHTML = '';
    items.forEach(item => {
        const isStream = !!item.source;
        const hasOverride = !!overrides[item.id];
        const div = document.createElement('div');
        div.className = `card ${isStream ? 'stream-item' : 'folder-item'}`;
        div.dataset.id = item.id;
        div.dataset.name = item.name;
        div.dataset.source = item.source || '';
        div.dataset.current = hasOverride ? overrides[item.id] : '';
        div.innerHTML = `
            ${hasOverride ? '<span class="badge-custom">رابط مخصص</span>' : ''}
            <img src="${item.image || ''}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23333%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 font-size=%2230%22 text-anchor=%22middle%22 fill=%22%23666%22>📺</text></svg>'">
            <div class="card-title">${item.name}</div>
        `;
        if (isStream) {
            div.addEventListener('click', () => openModal(item, hasOverride));
        } else {
            div.addEventListener('click', () => loadItems(item.id));
        }
        grid.appendChild(div);
    });
}

function goBack() { loadItems(''); }

// ============================================================
// Modal
// ============================================================
function openModal(item, hasOverride) {
    currentItemId = item.id;
    document.getElementById('m_name').textContent = item.name;
    document.getElementById('m_orig').value = item.source || '';
    document.getElementById('m_custom').value = overrides[item.id] || '';
    const proxyLink = `${BASE}/proxy/video.m3u8?id=${item.id}${currentCat ? '&cat=' + currentCat : ''}`;
    document.getElementById('m_proxy').value = proxyLink;
    const resetBtn = document.getElementById('m_reset_btn');
    resetBtn.style.display = hasOverride ? 'inline-flex' : 'none';
    document.getElementById('channelModal').style.display = 'flex';
}

function closeModal() { document.getElementById('channelModal').style.display = 'none'; }
window.onclick = (e) => { if (e.target === document.getElementById('channelModal')) closeModal(); };

async function saveIndividual() {
    const val = document.getElementById('m_custom').value;
    if (val) {
        overrides[currentItemId] = val;
    } else {
        delete overrides[currentItemId];
    }
    await saveConfig();
    closeModal();
    loadItems(currentCat);
}

async function resetChannel() {
    delete overrides[currentItemId];
    await saveConfig();
    closeModal();
    loadItems(currentCat);
}

function copyProxy() {
    const val = document.getElementById('m_proxy').value;
    navigator.clipboard.writeText(val).then(() => alert('تم نسخ الرابط. ضعه في قسم Video في AppCreator24'));
}

// ============================================================
// Boot
// ============================================================
init();
</script>
</body>
</html>
